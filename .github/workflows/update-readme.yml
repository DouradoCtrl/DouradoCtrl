name: Generate GitHub Stats SVGs

on:
  schedule:
    - cron: "0 0 * * *" # Executa a cada meia-noite
  workflow_dispatch: # Permite execução manual

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests lxml python-dateutil

      - name: Run script to update SVGs
        env:
          ACCESS_TOKEN: ${{ secrets.ACCESS_TOKEN }}
          USER_NAME: ${{ github.repository_owner }}
        run: python update_stats.py

      - name: Commit and push if changed
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add dark_mode.svg light_mode.svg cache/
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update GitHub Stats SVGs" && git push)
